name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
            artifact: "dist/*.exe"
          - os: macos-latest
            script: package:mac
            artifact: |
              dist/*.dmg
              dist/*.zip
          - os: ubuntu-latest
            script: package:linux
            artifact: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: codex-history-doctor-${{ matrix.os }}
          path: ${{ matrix.artifact }}
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          files: ${{ matrix.artifact }}
